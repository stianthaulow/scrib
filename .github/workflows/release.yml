name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/scrib-upload.jks

      - name: Build release AAB and APK
        run: ./gradlew bundleRelease assembleRelease
        env:
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/Scrib-${VERSION}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            app/build/outputs/apk/release/Scrib-*.apk
            app/build/outputs/bundle/release/app-release.aab
